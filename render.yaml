services:
  - type: web
    name: taskflix-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PASSWORD_RESET_CODE
        value: "1234"
      - key: FRONTEND_URL
        sync: false
      - key: NODE_VERSION
        value: "22"
